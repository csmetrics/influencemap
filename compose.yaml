services:
  konigsberg:
    build:
      context: .
      dockerfile: konigsberg.dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - /data/bingraph-openalex:/influencemap/bingraph-openalex
    environment:
      # --preload: JIT + mmap init happen once in the master; forked
      #   workers inherit the compiled state via copy-on-write instead of
      #   each of 32 workers redoing 30-90s of Numba compilation.
      # --timeout 300: allow cold mmap page-in for the 33 GB paper-title
      #   file on the very first request, in case warmup misses a path.
      GUNICORN_CMD_ARGS: --workers 32 --preload --timeout 300 --graceful-timeout 300 --bind 0.0.0.0:8000
  webapp:
    build:
      context: .
      dockerfile: webapp.dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - ./logs:/influencemap/logs
    environment:
      KONIGSBERG_URL: http://konigsberg:8000
      # 300s so a slow konigsberg first-request doesn't kill the webapp
      # worker mid-flight (was 90s, which the flower render can exceed
      # when konigsberg is still warming up).
      GUNICORN_CMD_ARGS: --workers 32 --timeout 300 --graceful-timeout 300 --bind 0.0.0.0:8000
    depends_on:
      - konigsberg
