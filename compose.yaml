# OpenSearch has moved to a dedicated server (see
# compose.opensearch.yaml), reachable over Tailscale. Rationale: its
# ~100GB Lucene index was competing with konigsberg's 88GB bingraph
# mmap for this host's page cache, forcing every graph walk to disk.
# With OpenSearch gone, the bingraph stays hot in RAM and flower
# computes return to pre-refactor speed.

services:
  konigsberg:
    build:
      context: .
      dockerfile: konigsberg.dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"
    volumes:
      - /data/bingraph-openalex:/influencemap/bingraph-openalex
    environment:
      # Thread pinning: numpy/BLAS default to spawning one thread per
      #   CPU core PER WORKER. With 32 workers on a 48-core box that
      #   balloons to ~1500 threads and kills fork throughput. Cap them.
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMBA_NUM_THREADS: "1"
      # --preload disabled: Numba JIT state does not always survive
      #   gunicorn's fork boundary. Each worker JITs independently at
      #   import time via _warmup() instead. Costs ~30-90s CPU per
      #   worker at startup but avoids fork races.
      # --timeout 300: cover cold mmap page-in for the 33 GB paper-title
      #   file on the very first request per worker.
      # KONIGSBERG_SKIP_WARMUP=1 skips _warmup() at import. Warmup was
      #   OOMing (32 GB anon per worker) because flowers.py numba
      #   functions with nb.typed.List compile with 20-60 GB of LLVM
      #   state and none of them are cache=True. Deferring JIT to the
      #   first user request spreads the memory spike out and lets other
      #   init settle first. First request will still be slow.
      # Warmup on — with cache=True the numba compile is a cache LOAD
      # (fast, tiny memory) instead of a re-JIT. JIT-only warmup is
      # enough; page-cache warmup was starving real user requests of
      # disk I/O so it's disabled by default. Set >0 during off-peak
      # hours to preload popular authors.
      KONIGSBERG_SKIP_WARMUP: "0"
      KONIGSBERG_WARMUP_COUNT: "0"
      # Sleep between page-cache warmups (seconds) — leaves I/O for
      # real requests when warmup IS enabled. Only used when
      # KONIGSBERG_WARMUP_COUNT > 0.
      KONIGSBERG_WARMUP_DELAY_SECS: "30"
      # Persistent numba cache. First deploy compiled; subsequent
      # restarts load from disk in seconds.
      NUMBA_CACHE_DIR: /influencemap/bingraph-openalex/.numba_cache
      # --workers 4: numba cache is warm, per-worker JIT cost is
      #   negligible now. 4 workers handle concurrent /get-flower calls
      #   without serializing behind one busy computation.
      # --timeout 1800: super-productive authors (Yoshua Bengio,
      #   Geoffrey Hinton, ...) genuinely take 5-15 min on cold cache
      #   because they have 1000+ papers each and get_flower is
      #   O(#papers × #citors). Long timeout so one successful compute
      #   fills webapp KB-CACHE forever. Normal authors return in <1min.
      GUNICORN_CMD_ARGS: --workers 4 --timeout 1800 --graceful-timeout 1800 --bind 0.0.0.0:8000
  webapp:
    build:
      context: .
      dockerfile: webapp.dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      # logs/ mount also stores flower_cache/ — persistent /submit
      #   response cache across container restarts.
      - ./logs:/influencemap/logs
      # OpenAlex snapshot .txt files for the OpenSearch indexer. Read-only
      # so the container can't accidentally mutate the source data. Change
      # the host path to wherever your snapshot lives.
      - /data/tmp:/data/openalex-txt:ro
    environment:
      KONIGSBERG_URL: http://konigsberg:8000
      # OpenSearch now lives on the dedicated search server, reached
      # over Tailscale. Replace with that server's `tailscale ip -4`.
      # Port 9201 on the host (9200 was taken by another Elasticsearch
      # instance on that machine).
      OPENSEARCH_URL: http://OPENSEARCH_TAILSCALE_IP:9201
      # DIAGNOSTIC: block /query + /query_about so external crawlers'
      # paper-title searches don't pollute measurements. Set to "0" (or
      # remove) to re-enable.
      WEBAPP_DISABLE_QUERY: "1"
      # --timeout 120: webapp gives up after 2 min. Konigsberg keeps
      #   computing in background and stores its own FLOWER-CACHE when
      #   done, so we do NOT need webapp workers to wait 15 min for
      #   giant computes to finish. Timing out webapp early frees the
      #   worker to serve fast pages (`/`, `/browse`, `/search`) while
      #   konigsberg finishes in background. Cloudflare timeout is
      #   already 100s so waiting longer on webapp doesn't help
      #   browser users anyway.
      # --workers 8: was 4. With shorter timeout, workers get freed
      #   more often, but headroom for concurrent long computes is
      #   still useful.
      # --max-requests + jitter: auto-recycle workers to release any
      #   memory the sync worker fails to return to the OS.
      GUNICORN_CMD_ARGS: --workers 8 --max-requests 200 --max-requests-jitter 20 --timeout 120 --graceful-timeout 120 --bind 0.0.0.0:8000
    depends_on:
      - konigsberg
